worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Dynamic rendering da página de cardápio (/c/<slug>): só crawlers de preview
    # de link (WhatsApp/Facebook/etc) são roteados pro BE, que devolve OG tags com
    # foto+nome da loja. Visitante humano recebe o SPA normal.
    map $http_user_agent $pm_is_crawler {
        default                                                  0;
        "~*(facebookexternalhit|WhatsApp|Twitterbot|Telegrambot|LinkedInBot|Slackbot|Discordbot|Applebot|SkypeUriPreview|Googlebot|bingbot|Pinterest|redditbot|vkShare|Embedly|nuzzel|Google-AMPHTML)" 1;
    }

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Universal Links (iOS) / App Links (Android): arquivos de associação servidos como
        # JSON e FORA do fallback do SPA (Apple/Google precisam do JSON, nunca do index.html).
        # O AASA não tem extensão, então o content-type é forçado aqui.
        location = /.well-known/apple-app-site-association {
            root /usr/share/nginx/html;
            default_type application/json;
            try_files $uri =404;
        }
        location = /.well-known/assetlinks.json {
            root /usr/share/nginx/html;
            default_type application/json;
            try_files $uri =404;
        }

        # Cardápio público: crawler recebe HTML com OG tags (PublicOgController);
        # humano cai no try_files e recebe o SPA.
        location ^~ /c/ {
            root /usr/share/nginx/html;

            proxy_http_version 1.1;
            proxy_set_header Host mvt-events-api.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_ssl_server_name on;

            if ($pm_is_crawler) {
                proxy_pass https://mvt-events-api.onrender.com;
            }

            try_files $uri /index.html;
        }

        # Proxy para APIs do backend
        location ~ ^/(auth|api|actuator)/ {
            proxy_pass https://mvt-events-api.onrender.com;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host mvt-events-api.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_ssl_server_name on;
        }
    }
}
